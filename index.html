<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>排班系統</title>
  <link rel="icon" type="image/png" href="favicon/edit-table.png">
  <link rel="stylesheet" href="schedule.css">
</head>
<body>

<!-- HEADER -->
<div class="app-header">
  <h1>排班系統</h1>
  <div class="hbtns">
    <button onclick="openEmpModal()">👥 管理員工</button>
    <button onclick="openShiftTypeModal()">🎨 管理班別</button>
    <button onclick="exportData()">💾 匯出資料</button>
    <button onclick="document.getElementById('importFile').click()">📂 匯入資料</button>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
    <button onclick="window.print()">🖨️ 列印</button>
  </div>
</div>

<!-- TOOLBAR -->
<div class="toolbar">
  <div class="month-nav">
    <button onclick="chMonth(-1)">‹</button>
    <span class="month-label" id="monthLabel"></span>
    <button onclick="chMonth(1)">›</button>
  </div>
  <div class="tbr">
    <button class="tbtn" onclick="goToday()">本月</button>
    <button class="tbtn auto" onclick="autoSchedule()">⚡ 自動排班</button>
    <button class="tbtn prim" onclick="clearMonthConfirm()">清空本月</button>
  </div>
</div>

<!-- LEGEND -->
<div class="legend" id="legend"></div>

<!-- MAIN -->
<div class="main">
  <div class="sch-wrap">
    <table class="sch-table" id="schTable"></table>
  </div>

  <div class="bot">
    <!-- Notes -->
    <div class="panel">
      <div class="ptitle">📋 本月注意事項</div>
      <ul class="nl" id="notesList"></ul>
      <div class="note-row">
        <input id="noteInput" type="text" placeholder="新增注意事項..." onkeydown="if(event.key==='Enter')addNote()">
        <select id="noteColor">
          <option value="#333333">⚫ 黑色</option>
          <option value="#6a1b9a">🟣 紫色</option>
          <option value="#e65100">🟠 橙色</option>
          <option value="#1565c0">🔵 藍色</option>
        </select>
        <button onclick="addNote()">新增</button>
      </div>
    </div>
    <!-- Stats -->
    <div class="panel">
      <div class="ptitle">📊 本月出勤統計</div>
      <div id="statsContent"></div>
    </div>
  </div>
</div>

<!-- SHIFT MODAL -->
<div class="ov" id="shiftModal">
  <div class="modal">
    <div class="mhd">
      <h3 id="shiftModalTitle">選擇班別</h3>
      <button class="mclose" onclick="closeShiftModal()">✕</button>
    </div>
    <div class="spicker" id="shiftPicker"></div>
    <div class="mac">
      <button class="btn btn-s" onclick="closeShiftModal()">取消</button>
      <button class="btn btn-p" onclick="saveShift()">確認</button>
    </div>
  </div>
</div>

<!-- EMPLOYEE MODAL -->
<div class="ov" id="empModal">
  <div class="modal">
    <div class="mhd">
      <h3>管理員工</h3>
      <button class="mclose" onclick="closeEmpModal()">✕</button>
    </div>
    <ul class="empl" id="empList"></ul>
    <div class="eadd">
      <input id="newEmpInput" type="text" placeholder="新增員工姓名..." onkeydown="if(event.key==='Enter')addEmployee()">
      <button class="btn btn-p" onclick="addEmployee()">新增</button>
    </div>
  </div>
</div>

<!-- SHIFT TYPE MODAL -->
<div class="ov" id="shiftTypeModal">
  <div class="modal">
    <div class="mhd">
      <h3>管理班別</h3>
      <button class="mclose" onclick="closeShiftTypeModal()">✕</button>
    </div>
    <div class="stm-section">
      <div class="stm-title">內建班別</div>
      <ul class="stm-list" id="builtinShiftList"></ul>
    </div>
    <div class="stm-section">
      <div class="stm-title">自訂班別</div>
      <ul class="stm-list" id="customShiftList"></ul>
      <div class="stm-add">
        <input id="csCode" type="text" maxlength="4" placeholder="代碼(最多4字)">
        <input id="csLabel" type="text" maxlength="10" placeholder="名稱">
        <button class="btn btn-p" onclick="addCustomShift()">新增</button>
      </div>
    </div>
    <div class="mac">
      <button class="btn btn-s" onclick="closeShiftTypeModal()">關閉</button>
    </div>
  </div>
</div>

<!-- STAFFING WARNING MODAL -->
<div class="ov" id="staffWarnModal">
  <div class="modal">
    <div class="mhd">
      <h3>⚠ 排班人力不符</h3>
      <button class="mclose" onclick="closeStaffWarnModal()">✕</button>
    </div>
    <div id="staffWarnDate" style="color:#888;font-size:.85rem;margin-bottom:8px;"></div>
    <ul id="staffWarnList" style="padding-left:1.4em;color:#c0392b;line-height:2;margin:0 0 16px;"></ul>
    <div class="mac">
      <button class="btn btn-p" onclick="closeStaffWarnModal()">我知道了</button>
    </div>
  </div>
</div>

<script src="schedule.js"></script>
</body>
</html>
